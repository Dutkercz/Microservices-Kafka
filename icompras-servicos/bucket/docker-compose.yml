services:
  mini-io:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: mini-io
    ports:
      - "9000:9000" #API
      - "9001:9001" #Console grafico
    volumes:
      - ./docs:/data # armazena no subdiretório "docs" (aqui no sistema) o conteúdo da pasta "/data" que é onde ficam os dados do container
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    restart: unless-stopped