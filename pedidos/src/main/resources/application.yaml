spring:
  application:
    name: pedidos
  datasource:
    url: jdbc:postgresql://localhost:5555/ipedidos
    username: postgres
    password: rootpassword
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

icompras:
  pedidos:
    clients:
      produtos:
        url: 'http://localhost:8081/api/produtos'
      clientes:
        url: 'http://localhost:8082/api/clientes'